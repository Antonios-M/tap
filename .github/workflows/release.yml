name: Release

# Release flow (python-semantic-release, release-PR style):
#
#   1. A normal push to main runs `release-pr`: if there are releasable commits
#      (feat/fix/...), it opens (or refreshes) a PR that bumps the version and
#      updates CHANGELOG.md on a `release/vX.Y.Z` branch.
#   2. **Squash-merge** that PR. The squash commit message is the PR title,
#      `chore(release): vX.Y.Z`, which lands on main and triggers `publish`.
#   3. `publish` builds the package, pushes the `vX.Y.Z` tag, and creates the
#      GitHub Release with the changelog section as notes.
#
# `workflow_dispatch` lets you (re)publish the current version in pyproject.toml
# manually — used to ship the very first tag.

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

# Never run two releases concurrently (avoids tag/branch races).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Open / refresh the version-bump PR on normal pushes to main.
  #    Skipped for the bot's own `chore(release):` commit so merging a release
  #    PR does not immediately open another one.
  # ---------------------------------------------------------------------------
  release-pr:
    name: Open release PR
    if: >-
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(uv run semantic-release version --print --no-commit --no-tag --no-push 2>/dev/null || true)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [ -z "$VERSION" ]; then
            echo "No releasable changes since the last release; nothing to do."
          else
            echo "Next version: ${VERSION}"
          fi

      - name: Apply bump + changelog on the release branch
        if: ${{ steps.ver.outputs.version != '' }}
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Writes pyproject.toml + CHANGELOG.md locally (no commit/tag/push here).
          uv run semantic-release version --no-commit --no-tag --no-push --skip-build
          git checkout -B "release/v${VERSION}"
          git add -A
          git commit -m "chore(release): v${VERSION}"
          # Force-push: the branch is regenerated each run, so overwrite any leftover
          # from a previous (e.g. failed) run instead of failing on non-fast-forward.
          git push --force origin "release/v${VERSION}"

      - name: Open or refresh the release PR
        if: ${{ steps.ver.outputs.version != '' }}
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="release/v${VERSION}"
          gh label create release --color 0e8a16 --description "Automated release PR" --force >/dev/null 2>&1 || true
          if [ -n "$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number // empty')" ]; then
            echo "Release PR already open for ${BRANCH}; refreshed via force-push."
          else
            gh pr create --base main --head "$BRANCH" --label release \
              --title "chore(release): v${VERSION}" \
              --body $'Automated release for **v'"${VERSION}"$'**.\n\n⚠️ **Squash-merge this PR** so the `chore(release):` commit lands on `main` and triggers tagging + the GitHub Release.'
          fi

  # ---------------------------------------------------------------------------
  # 2. On the squash-merged `chore(release):` commit (or a manual dispatch):
  #    build, tag, and create the GitHub Release.
  # ---------------------------------------------------------------------------
  publish:
    name: Tag & GitHub Release
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen

      - name: Read version from pyproject.toml
        id: ver
        run: |
          set -euo pipefail
          VERSION="$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION}"

      - name: Build distributions
        run: uv build

      - name: Push tag (idempotent)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists on origin; skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "v${VERSION}" -m "v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Extract release notes from CHANGELOG.md
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          awk -v v="## v${VERSION}" '
            index($0, v) == 1 { f = 1; next }
            f && /^## v/ { exit }
            f { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release v${VERSION}. See CHANGELOG.md for details." > RELEASE_NOTES.md
          fi

      - name: Create or update the GitHub Release
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" dist/* --clobber
          else
            gh release create "v${VERSION}" dist/* \
              --title "v${VERSION}" \
              --notes-file RELEASE_NOTES.md
          fi
